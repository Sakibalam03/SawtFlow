name: infinia-chatterbox
channels: [conda-forge, pytorch, nvidia]
dependencies:
  - python=3.11
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - chatterbox-tts
      - numpy
      - pyyaml
      - soundfile
      - setuptools<81
      - torch==2.6.0+cu126
      - torchaudio==2.6.0+cu126
